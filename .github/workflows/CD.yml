name: Python CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14.4'

    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    - name: Run-tests
      run: |
        pytest || true

    - name: Criar artefato (simples)
      run: |
        mkdir dist
        cp app.py dist/
        echo "Build gerado em $(date)" > dist/version.txt

    - name: Upload do artefato
      uses: actions/upload-artifact@v4
      with:
        name: app-build
        path: dist/

    - name: Simular deploy
      run: |
        echo "Deploy iniciado..."
        echo "Aplicação enviada para ambiente de produção (simulado)"